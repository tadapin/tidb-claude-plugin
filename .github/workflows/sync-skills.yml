name: Sync skills from upstream

on:
  schedule:
    - cron: '0 9 * * *' # Daily at 09:00 UTC (18:00 JST)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run sync script
        run: bash scripts/sync-skills.sh

      - name: Bump patch version if skills changed
        run: |
          if [ -n "$(git status --porcelain skills/)" ]; then
            cd .claude-plugin
            current=$(jq -r .version plugin.json)
            IFS='.' read -r major minor patch <<< "$current"
            new_version="$major.$minor.$((patch + 1))"
            jq --arg v "$new_version" '.version = $v' plugin.json > tmp.json && mv tmp.json plugin.json
            jq --arg v "$new_version" '.metadata.version = $v | .plugins[0].version = $v' marketplace.json > tmp.json && mv tmp.json marketplace.json
            echo "Bumped version: $current -> $new_version"
          else
            echo "No skill changes detected, skipping version bump"
          fi

      - name: Create PR if skills changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: sync skills from upstream"
          title: "chore: sync skills from upstream"
          body: |
            Automated daily sync from:
            - [pingcap/agent-rules](https://github.com/pingcap/agent-rules)
            - [zero.tidbcloud.com/SKILL.md](https://zero.tidbcloud.com/SKILL.md)
          branch: auto/sync-skills
          delete-branch: true
